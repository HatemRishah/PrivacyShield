workflows:
  android-debug-build:
    name: Privacy Shield Debug Build
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Unzip and Build
        script: |
          unzip PrivacyShield.zip
          cd PrivacyShield
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - PrivacyShield/app/build/outputs/apk/debug/app-debug.apk
