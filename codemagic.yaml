workflows:
  android-debug-build:
    name: Privacy Shield Debug Build
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Build Debug APK
        script: |
          gradle wrapper
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
